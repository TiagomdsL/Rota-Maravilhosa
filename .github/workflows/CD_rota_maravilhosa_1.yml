name: CD — Rota Maravilhosa

# ─────────────────────────────────────────────────────────────────────────────
# Fluxo CD correto:
#
#   push → main
#     │
#     ├─ detect-changes        (quais serviços mudaram)
#     │
#     ├─ cloud-build           (gcloud builds submit → build + push para Artifact Registry)
#     │
#     ├─ deploy                (deploy-app.sh → kubectl apply de tudo no GKE)
#     │
#     ├─ verify-rollout        (kubectl rollout status de cada deployment)
#     │
#     ├─ smoke-tests           (port-forward para cada serviço no cluster → testar endpoints reais)
#     │   ├─ smoke-api-gateway
#     │   ├─ smoke-data-uc4
#     │   ├─ smoke-data-uc123
#     │   ├─ smoke-data-uc8-uc11
#     │   ├─ smoke-prediction-uc5-uc6
#     │   ├─ smoke-prediction-uc9-uc10
#     │   └─ smoke-route-uc7
#     │
#     └─ rollback              (só corre se smoke-tests falharem → rollback.sh)
#
# Os smoke tests correm DEPOIS do deploy contra os pods reais no cluster GKE,
# usando kubectl port-forward para expor cada serviço ao runner.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main

env:
  PROJECT:   proj1cc-493515
  REGION:    us-west4
  CLUSTER:   rota-maravilhosa-cluster
  NAMESPACE: rota-maravilhosa
  REGISTRY:  us-west4-docker.pkg.dev/proj1cc-493515/rota-maravilhosa

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Detectar quais serviços mudaram
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  detect-changes:
    name: Detectar alterações
    runs-on: ubuntu-latest
    outputs:
      any_service:         ${{ steps.filter.outputs.any_service }}
      api_gateway:         ${{ steps.filter.outputs.api_gateway }}
      data_uc4:            ${{ steps.filter.outputs.data_uc4 }}
      data_uc123:          ${{ steps.filter.outputs.data_uc123 }}
      data_uc8_uc11:       ${{ steps.filter.outputs.data_uc8_uc11 }}
      prediction_uc5_uc6:  ${{ steps.filter.outputs.prediction_uc5_uc6 }}
      prediction_uc9_uc10: ${{ steps.filter.outputs.prediction_uc9_uc10 }}
      route_uc7:           ${{ steps.filter.outputs.route_uc7 }}

    steps:
      - uses: actions/checkout@v4

      - name: Filtrar paths alterados
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api_gateway:
              - 'api_gateway/**'
            data_uc4:
              - 'data_service_UC4/**'
            data_uc123:
              - 'data_service_UC123/**'
            data_uc8_uc11:
              - 'data_service_UC8_UC11/**'
            prediction_uc5_uc6:
              - 'prediction_service_UC5_UC6/**'
            prediction_uc9_uc10:
              - 'prediction_service_UC9_UC10/**'
            route_uc7:
              - 'route_service_UC7/**'
            any_service:
              - 'api_gateway/**'
              - 'data_service_UC4/**'
              - 'data_service_UC123/**'
              - 'data_service_UC8_UC11/**'
              - 'prediction_service_UC5_UC6/**'
              - 'prediction_service_UC9_UC10/**'
              - 'route_service_UC7/**'
              - 'cloudbuild.yaml'
              - 'deployment/**'

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Cloud Build: build + push de todas as imagens para o Artifact Registry
  # Usa o cloudbuild.yaml já existente no repo (gcloud builds submit)
  # ─────────────────────────────────────────────────────────────────────────────
  cloud-build:
    name: Cloud Build (build + push)
    needs: detect-changes
    if: needs.detect-changes.outputs.any_service == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT }}

      # Submete o cloudbuild.yaml existente — constrói e faz push de todos os serviços
      - name: Submeter ao Cloud Build
        run: |
          gcloud builds submit . \
            --config=cloudbuild.yaml \
            --project=${{ env.PROJECT }} \
            --region=${{ env.REGION }} \
            --timeout=1800s

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy: executa deploy-app.sh no cluster GKE
  # Aplica ConfigMaps, Secrets, Services, Deployments, HPA e Ingress
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy para GKE
    needs: cloud-build
    if: needs.cloud-build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar gcloud + kubectl
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT }}
          install_components: kubectl

      - name: Obter credenciais do cluster GKE
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --region ${{ env.REGION }} --project ${{ env.PROJECT }}

      - name: Garantir namespace
        run: |
          kubectl apply -f deployment/kubernetes/namespace.yaml 2>/dev/null || \
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      # Secret BigQuery — vem do GitHub Secret (equivalente ao bq-key.json do build-and-deploy.sh)
      - name: Criar/actualizar Secret BigQuery
        run: |
          echo '${{ secrets.BQ_SERVICE_ACCOUNT_KEY }}' > /tmp/bq-key.json
          kubectl create secret generic bq-secret \
            --namespace=${{ env.NAMESPACE }} \
            --from-file=API_TOKEN=/tmp/bq-key.json \
            --dry-run=client -o yaml | kubectl apply -f -
          rm /tmp/bq-key.json

      # Verificar modelos BQ — equivalente ao que deploy-app.sh faz no passo [3/9]
      - name: Verificar modelos BigQuery
        run: |
          MODELS=$(bq ls --models ${{ env.PROJECT }}:accidents 2>/dev/null \
            | grep -cE "severity_model|risk_model|occurrence_model" || echo "0")
          echo "Modelos encontrados: $MODELS/4"
          if [ "$MODELS" -lt 4 ]; then
            echo "Modelos incompletos — a criar com create-models.sh..."
            bash deployment/scripts/create-models.sh
          else
            echo "Todos os modelos existem — a saltar criação."
          fi

      # deploy-app.sh aplica networkpolicy, configmaps, services, deployments, HPA, ingress
      - name: Executar deploy-app.sh
        run: |
          chmod +x deployment/scripts/deploy-app.sh
          cd deployment/scripts && ./deploy-app.sh

      # Aplicar circuit breakers Istio (circuit-breakers.sh)
      - name: Aplicar Circuit Breakers Istio
        run: |
          chmod +x deployment/scripts/circuit-breakers.sh
          cd deployment/scripts && ./circuit-breakers.sh || \
            echo "Circuit breakers saltados (Istio pode não estar instalado)"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Verificar rollout: confirma que todos os pods ficaram Running
  # ─────────────────────────────────────────────────────────────────────────────
  verify-rollout:
    name: Verificar rollout
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar gcloud + kubectl
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT }}
          install_components: kubectl

      - name: Obter credenciais do cluster
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --region ${{ env.REGION }} --project ${{ env.PROJECT }}

      - name: Estado do cluster — monitoring.sh
        run: |
          chmod +x deployment/scripts/monitoring.sh
          bash deployment/scripts/monitoring.sh

      - name: kubectl rollout status — todos os deployments
        run: |
          DEPLOYMENTS=(
            api-gateway
            data-service-uc4
            data-service-uc123
            data-service-uc8-uc11
            prediction-service-uc5-uc6
            prediction-service-uc9-uc10
            route-service-uc7
          )
          FAILED=0
          for d in "${DEPLOYMENTS[@]}"; do
            echo "→ $d..."
            if kubectl rollout status deployment/$d \
                -n ${{ env.NAMESPACE }} --timeout=120s; then
              echo "OK $d"
            else
              echo "FALHOU $d"
              kubectl describe deployment/$d -n ${{ env.NAMESPACE }} | tail -20
              FAILED=$((FAILED+1))
            fi
          done
          [ $FAILED -eq 0 ] || { kubectl get pods -n ${{ env.NAMESPACE }}; exit 1; }

  # ─────────────────────────────────────────────────────────────────────────────
  # JOBS 5.x — Smoke Tests pós-deploy (em paralelo por serviço)
  #
  # Estratégia: kubectl port-forward expõe cada serviço ClusterIP ao runner.
  # Os testes correm contra os pods REAIS no cluster, depois do deploy.
  # Os endpoints que chamam BigQuery são testados com mock Python (sem credenciais).
  # ─────────────────────────────────────────────────────────────────────────────

  smoke-api-gateway:
    name: "Smoke pós-deploy: api-gateway (:8000)"
    needs: [detect-changes, verify-rollout]
    if: |
      needs.verify-rollout.result == 'success' &&
      needs.detect-changes.outputs.api_gateway == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT }}
          install_components: kubectl
      - name: Obter credenciais do cluster
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --region ${{ env.REGION }} --project ${{ env.PROJECT }}

      - name: Port-forward api-gateway
        run: |
          kubectl port-forward svc/api-gateway 8000:8000 \
            -n ${{ env.NAMESPACE }} &
          sleep 4

      - name: "GET /health → {status: ok}"
        run: |
          curl -sf http://localhost:8000/health | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"
          echo "OK"

      - name: "GET /ready → {status: ok}"
        run: |
          curl -sf http://localhost:8000/ready | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"
          echo "OK"

      - name: "GET /metrics → text/plain + requests_total"
        run: |
          R=$(curl -sf -D - http://localhost:8000/metrics)
          echo "$R" | grep -i "text/plain"
          echo "$R" | grep "requests_total"
          echo "OK"

  smoke-data-uc4:
