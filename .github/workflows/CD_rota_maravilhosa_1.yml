      - name: "GET /health → {status: ok}"
        run: |
          curl -sf http://localhost:8001/health | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"
          echo "OK"

      - name: "GET /ready → {status: ok}"
        run: |
          curl -sf http://localhost:8001/ready | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"
          echo "OK"

      - name: "GET /metrics → text/plain + requests_total"
        run: |
          R=$(curl -sf -D - http://localhost:8001/metrics)
          echo "$R" | grep -i "text/plain"
          echo "$R" | grep "requests_total"
          echo "OK"

  smoke-data-uc123:
    name: "Smoke pós-deploy: data-service-uc123 (:8004)"
    needs: [detect-changes, verify-rollout]
    if: |
      needs.verify-rollout.result == 'success' &&
      needs.detect-changes.outputs.data_uc123 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT }}
          install_components: kubectl
      - name: Obter credenciais do cluster
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --region ${{ env.REGION }} --project ${{ env.PROJECT }}

      - name: Port-forward data-service-uc123
        run: |
          kubectl port-forward svc/data-service-uc123 8004:8004 \
            -n ${{ env.NAMESPACE }} &
          sleep 4

      - name: "GET /health → {status: ok}"
        run: |
          curl -sf http://localhost:8004/health | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"
          echo "OK"

      - name: "GET /ready → {status: ok}"
        run: |
          curl -sf http://localhost:8004/ready | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"
          echo "OK"

      - name: "GET /metrics → text/plain + requests_total"
        run: |
          R=$(curl -sf -D - http://localhost:8004/metrics)
          echo "$R" | grep -i "text/plain"
          echo "$R" | grep "requests_total"
          echo "OK"

  smoke-data-uc8-uc11:
    name: "Smoke pós-deploy: data-service-uc8-uc11 (:8007)"
    needs: [detect-changes, verify-rollout]
    if: |
      needs.verify-rollout.result == 'success' &&
      needs.detect-changes.outputs.data_uc8_uc11 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT }}
          install_components: kubectl
      - name: Obter credenciais do cluster
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --region ${{ env.REGION }} --project ${{ env.PROJECT }}

      - name: Port-forward data-service-uc8-uc11
        run: |
          kubectl port-forward svc/data-service-uc8-uc11 8007:8007 \
            -n ${{ env.NAMESPACE }} &
          sleep 4

      # ── Endpoints sem BQ (curl direto ao pod real) ───────────────────────
      - name: "GET /health → {status: ok}"
        run: |
          curl -sf http://localhost:8007/health | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"
          echo "OK"

      - name: "GET /ready → {status: ok}"
        run: |
          curl -sf http://localhost:8007/ready | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"
          echo "OK"

      - name: "GET /metrics → text/plain + requests_total"
        run: |
          R=$(curl -sf -D - http://localhost:8007/metrics)
          echo "$R" | grep -i "text/plain"
          echo "$R" | grep "requests_total"
          echo "OK"

      # ── Endpoints com BQ: testados com mock (BQ real não acessível do runner) ─
      - name: Instalar deps para testes BQ mockados
        run: |
          pip install fastapi httpx google-cloud-bigquery google-auth \
            prometheus-client opentelemetry-api opentelemetry-sdk \
            opentelemetry-exporter-otlp-proto-http \
            opentelemetry-instrumentation-fastapi \
            opentelemetry-instrumentation-httpx --quiet

      - name: "GET /hotspots — lista com campos corretos"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import patch, MagicMock
          tracing = MagicMock(); sys.modules["tracing"] = tracing
          sys.path.insert(0, "data_service_UC8_UC11")
          from main import app
          from fastapi.testclient import TestClient
          def row(**kw):
              r = MagicMock(); r.__getitem__ = lambda s,k: kw[k]; r.keys = lambda: kw.keys(); return r
          mc = MagicMock()
          mc.query.return_value.result.return_value = [
              row(Start_Lat=34.05, Start_Lng=-118.24, count=120),
              row(Start_Lat=37.77, Start_Lng=-122.41, count=85),
          ]
          with patch("main.get_client", return_value=mc):
              r = TestClient(app).get("/hotspots")
              assert r.status_code == 200, f"Status {r.status_code}"
              d = r.json()
              assert isinstance(d, list) and len(d) == 2
              assert "Start_Lat" in d[0] and "Start_Lng" in d[0] and "count" in d[0]
              print("OK /hotspots")
          EOF

      - name: "GET /hotspots?city=Miami&state=FL&limit=5 — filtros na SQL"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import patch, MagicMock
          tracing = MagicMock(); sys.modules["tracing"] = tracing
          sys.path.insert(0, "data_service_UC8_UC11")
          from main import app
          from fastapi.testclient import TestClient
          def row(**kw):
              r = MagicMock(); r.__getitem__ = lambda s,k: kw[k]; r.keys = lambda: kw.keys(); return r
          mc = MagicMock()
          mc.query.return_value.result.return_value = [row(Start_Lat=25.77, Start_Lng=-80.19, count=42)]
          with patch("main.get_client", return_value=mc):
              r = TestClient(app).get("/hotspots?city=Miami&state=FL&limit=5")
              assert r.status_code == 200
              sql = mc.query.call_args[0][0]
              assert "Miami" in sql and "FL" in sql and "5" in sql
              print("OK /hotspots filtros")
          EOF

      - name: "GET /hotspots — BQ falha → 500"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import patch, MagicMock
          tracing = MagicMock(); sys.modules["tracing"] = tracing
          sys.path.insert(0, "data_service_UC8_UC11")
          from main import app
          from fastapi.testclient import TestClient
          mc = MagicMock(); mc.query.side_effect = Exception("BQ down")
          with patch("main.get_client", return_value=mc):
              r = TestClient(app, raise_server_exceptions=False).get("/hotspots")
              assert r.status_code == 500
              print("OK /hotspots BQ falha → 500")
          EOF

      - name: "GET /county-comparison?state=CA — campos corretos"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import patch, MagicMock
          tracing = MagicMock(); sys.modules["tracing"] = tracing
          sys.path.insert(0, "data_service_UC8_UC11")
          from main import app
          from fastapi.testclient import TestClient
          def row(**kw):
              r = MagicMock(); r.__getitem__ = lambda s,k: kw[k]; r.keys = lambda: kw.keys(); return r
          mc = MagicMock()
          mc.query.return_value.result.return_value = [
              row(County="Los Angeles", accident_count=5000, avg_severity=2.3),
              row(County="San Diego",   accident_count=2100, avg_severity=1.9),
          ]
          with patch("main.get_client", return_value=mc):
              r = TestClient(app).get("/county-comparison?state=CA")
              assert r.status_code == 200
              d = r.json()
              assert "County" in d[0] and "accident_count" in d[0] and "avg_severity" in d[0]
              sql = mc.query.call_args[0][0]
              assert "CA" in sql
              print("OK /county-comparison")
          EOF

      - name: "GET /county-comparison — sem state → 422"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import MagicMock
          tracing = MagicMock(); sys.modules["tracing"] = tracing
          sys.path.insert(0, "data_service_UC8_UC11")
          from main import app
          from fastapi.testclient import TestClient
          r = TestClient(app).get("/county-comparison")
          assert r.status_code == 422
          print("OK /county-comparison sem state → 422")
          EOF

      - name: "GET /county-comparison — BQ falha → 500"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import patch, MagicMock
          tracing = MagicMock(); sys.modules["tracing"] = tracing
          sys.path.insert(0, "data_service_UC8_UC11")
          from main import app
          from fastapi.testclient import TestClient
          mc = MagicMock(); mc.query.side_effect = Exception("BQ timeout")
          with patch("main.get_client", return_value=mc):
              r = TestClient(app, raise_server_exceptions=False).get("/county-comparison?state=CA")
              assert r.status_code == 500
              print("OK /county-comparison BQ falha → 500")
          EOF

