  smoke-prediction-uc9-uc10:
    name: "Smoke pós-deploy: prediction-service-uc9-uc10 (:8008)"
    needs: [detect-changes, verify-rollout]
    if: |
      needs.verify-rollout.result == 'success' &&
      needs.detect-changes.outputs.prediction_uc9_uc10 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT }}
          install_components: kubectl
      - name: Obter credenciais do cluster
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --region ${{ env.REGION }} --project ${{ env.PROJECT }}

      - name: Port-forward prediction-service-uc9-uc10
        run: |
          kubectl port-forward svc/prediction-service-uc9-uc10 8008:8008 \
            -n ${{ env.NAMESPACE }} &
          sleep 4

      # ── Endpoints sem BQ ─────────────────────────────────────────────────
      - name: "GET /health → {status: ok}"
        run: |
          curl -sf http://localhost:8008/health | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"
          echo "OK"

      - name: "GET /ready → {status: ok}"
        run: |
          curl -sf http://localhost:8008/ready | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"
          echo "OK"

      - name: "GET /metrics → text/plain + requests_total"
        run: |
          R=$(curl -sf -D - http://localhost:8008/metrics)
          echo "$R" | grep -i "text/plain"
          echo "$R" | grep "requests_total"
          echo "OK"

      # ── Endpoints com BQ: mock ────────────────────────────────────────────
      - name: Instalar deps para testes BQ mockados
        run: |
          pip install fastapi httpx google-cloud-bigquery google-auth \
            prometheus-client opentelemetry-api opentelemetry-sdk \
            opentelemetry-exporter-otlp-proto-http \
            opentelemetry-instrumentation-fastapi \
            opentelemetry-instrumentation-httpx --quiet

      - name: "POST /accidents/predict-occurrence — prob + risk_level corretos"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import patch, MagicMock
          tracing = MagicMock(); sys.modules["tracing"] = tracing
          sys.path.insert(0, "prediction_service_UC9_UC10")
          from main import app
          from fastapi.testclient import TestClient
          row = MagicMock(); row.__getitem__ = lambda s,k: 0.4 if k=="accident_probability" else None
          mc = MagicMock(); mc.query.return_value.result.return_value = [row]
          payload = {"latitude":34.05,"longitude":-118.24,"hour":8,"weather_condition":"Clear"}
          with patch("main.get_client", return_value=mc):
              r = TestClient(app).post("/accidents/predict-occurrence", json=payload)
              assert r.status_code == 200, f"Status {r.status_code}: {r.text}"
              d = r.json()
              assert "accident_probability" in d and "risk_level" in d
              assert d["risk_level"] in ("Low","Medium","High","Critical")
              print(f"OK predict-occurrence: prob={d['accident_probability']} level={d['risk_level']}")
          EOF

      - name: "POST /accidents/predict-occurrence — hour=25 → 422"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import MagicMock
          tracing = MagicMock(); sys.modules["tracing"] = tracing
          sys.path.insert(0, "prediction_service_UC9_UC10")
          from main import app
          from fastapi.testclient import TestClient
          r = TestClient(app).post("/accidents/predict-occurrence",
              json={"latitude":34.05,"longitude":-118.24,"hour":25,"weather_condition":"Clear"})
          assert r.status_code == 422
          print("OK hour=25 → 422")
          EOF

      - name: "POST /accidents/predict-occurrence — body vazio → 422"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import MagicMock
          tracing = MagicMock(); sys.modules["tracing"] = tracing
          sys.path.insert(0, "prediction_service_UC9_UC10")
          from main import app
          from fastapi.testclient import TestClient
          r = TestClient(app).post("/accidents/predict-occurrence", json={})
          assert r.status_code == 422
          print("OK body vazio → 422")
          EOF

      - name: "POST /accidents/predict-occurrence — BQ falha → 500"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import patch, MagicMock
          tracing = MagicMock(); sys.modules["tracing"] = tracing
          sys.path.insert(0, "prediction_service_UC9_UC10")
          from main import app
          from fastapi.testclient import TestClient
          mc = MagicMock(); mc.query.side_effect = Exception("BQ down")
          with patch("main.get_client", return_value=mc):
              r = TestClient(app, raise_server_exceptions=False).post(
                  "/accidents/predict-occurrence",
                  json={"latitude":34.05,"longitude":-118.24,"hour":8,"weather_condition":"Rain"})
              assert r.status_code == 500
              print("OK BQ falha → 500")
          EOF

      - name: "POST /accidents/simulate-risk — junction → fator 1.3 aplicado"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import patch, MagicMock
          tracing = MagicMock(); sys.modules["tracing"] = tracing
          sys.path.insert(0, "prediction_service_UC9_UC10")
          from main import app
          from fastapi.testclient import TestClient
          row = MagicMock(); row.__getitem__ = lambda s,k: 0.4 if k=="accident_probability" else None
          mc = MagicMock(); mc.query.return_value.result.return_value = [row]
          payload = {"latitude":34.05,"longitude":-118.24,"hour":8,"weather_condition":"Clear","road_topology":"junction"}
          with patch("main.get_client", return_value=mc):
              r = TestClient(app).post("/accidents/simulate-risk", json=payload)
              assert r.status_code == 200, f"Status {r.status_code}: {r.text}"
              d = r.json()
              assert "probability_score" in d and "predicted_severity" in d and "explanation" in d
              assert d["probability_score"] > 0.4, f"Esperado >0.4 (junction ×1.3), obtido {d['probability_score']}"
              assert isinstance(d["explanation"], list)
              print(f"OK simulate-risk junction: score={d['probability_score']}")
          EOF

      - name: "POST /accidents/simulate-risk — todos os road_topology → 200"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import patch, MagicMock
          tracing = MagicMock(); sys.modules["tracing"] = tracing
          sys.path.insert(0, "prediction_service_UC9_UC10")
          from main import app
          from fastapi.testclient import TestClient
          row = MagicMock(); row.__getitem__ = lambda s,k: 0.3 if k=="accident_probability" else None
          mc = MagicMock(); mc.query.return_value.result.return_value = [row]
          topologies = ["junction","roundabout","curve","traffic_signal","straight","unknown_topology"]
          with patch("main.get_client", return_value=mc):
              client = TestClient(app)
              for topo in topologies:
                  r = client.post("/accidents/simulate-risk",
                      json={"latitude":34.05,"longitude":-118.24,"hour":10,
                            "weather_condition":"Clear","road_topology":topo})
                  assert r.status_code == 200, f"{topo}: status {r.status_code}"
                  print(f"OK simulate-risk {topo}: {r.json()['probability_score']}")
          EOF

      - name: "POST /accidents/simulate-risk — sem road_topology → 422"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import MagicMock
          tracing = MagicMock(); sys.modules["tracing"] = tracing
          sys.path.insert(0, "prediction_service_UC9_UC10")
          from main import app
          from fastapi.testclient import TestClient
          r = TestClient(app).post("/accidents/simulate-risk",
              json={"latitude":34.05,"longitude":-118.24,"hour":8,"weather_condition":"Clear"})
          assert r.status_code == 422
          print("OK sem road_topology → 422")
          EOF

      - name: "POST /accidents/simulate-risk — BQ falha → 500"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import patch, MagicMock
