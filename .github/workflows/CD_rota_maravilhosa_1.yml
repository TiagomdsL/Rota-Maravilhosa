                  "/accidents/simulate-risk",
                  json={"latitude":34.05,"longitude":-118.24,"hour":8,
                        "weather_condition":"Clear","road_topology":"junction"})
              assert r.status_code == 500
              print("OK BQ falha → 500")
          EOF

  smoke-route-uc7:
    name: "Smoke pós-deploy: route-service-uc7 (:8003)"
    needs: [detect-changes, verify-rollout]
    if: |
      needs.verify-rollout.result == 'success' &&
      needs.detect-changes.outputs.route_uc7 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT }}
          install_components: kubectl
      - name: Obter credenciais do cluster
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --region ${{ env.REGION }} --project ${{ env.PROJECT }}

      - name: Port-forward route-service-uc7
        run: |
          kubectl port-forward svc/route-service-uc7 8003:8003 \
            -n ${{ env.NAMESPACE }} &
          sleep 4

      - name: "GET /health → {status: ok}"
        run: |
          curl -sf http://localhost:8003/health | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"
          echo "OK"

      - name: "GET /ready → {status: ok}"
        run: |
          curl -sf http://localhost:8003/ready | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"
          echo "OK"

      - name: "GET /metrics → text/plain + requests_total"
        run: |
          R=$(curl -sf -D - http://localhost:8003/metrics)
          echo "$R" | grep -i "text/plain"
          echo "$R" | grep "requests_total"
          echo "OK"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 6 — Rollback automático se qualquer smoke test falhar
  # Usa kubectl rollout undo (equivalente ao rollback.sh sem o prompt interactivo)
  # ─────────────────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback automático
    needs:
      - deploy
      - smoke-api-gateway
      - smoke-data-uc4
      - smoke-data-uc123
      - smoke-data-uc8-uc11
      - smoke-prediction-uc5-uc6
      - smoke-prediction-uc9-uc10
      - smoke-route-uc7
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      (
        needs.smoke-api-gateway.result         == 'failure' ||
        needs.smoke-data-uc4.result            == 'failure' ||
        needs.smoke-data-uc123.result          == 'failure' ||
        needs.smoke-data-uc8-uc11.result       == 'failure' ||
        needs.smoke-prediction-uc5-uc6.result  == 'failure' ||
        needs.smoke-prediction-uc9-uc10.result == 'failure' ||
        needs.smoke-route-uc7.result           == 'failure'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar gcloud + kubectl
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT }}
          install_components: kubectl

      - name: Obter credenciais do cluster
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --region ${{ env.REGION }} --project ${{ env.PROJECT }}

      # rollback.sh original tem prompt interactivo — replicamos o kubectl rollout undo
      - name: Rollback — kubectl rollout undo (equivalente a rollback.sh)
        run: |
          DEPLOYMENTS=(
            api-gateway
            data-service-uc4
            data-service-uc123
            data-service-uc8-uc11
            prediction-service-uc5-uc6
            prediction-service-uc9-uc10
            route-service-uc7
          )
          for d in "${DEPLOYMENTS[@]}"; do
            echo "→ Rollback: $d"
            kubectl rollout undo deployment/$d -n ${{ env.NAMESPACE }} 2>/dev/null || \
              echo "  $d: sem revisão anterior ou deployment não existe"
          done

      - name: Aguardar rollback — api-gateway
        run: |
          kubectl rollout status deployment/api-gateway \
            -n ${{ env.NAMESPACE }} --timeout=120s || true

      - name: Estado após rollback — monitoring.sh
        run: |
          chmod +x deployment/scripts/monitoring.sh
          bash deployment/scripts/monitoring.sh

      - name: Marcar pipeline como falhado
        run: |
          echo "Rollback executado — smoke tests falharam após deploy."
          exit 1