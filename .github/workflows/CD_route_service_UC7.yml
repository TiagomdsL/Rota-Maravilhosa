name: CD — route-service-uc7

on:
  push:
    branches:
    - main
    paths:
    - "route_service_UC7/**"

env:
  IMAGE: route-service-uc7
  PORT: 8003

jobs:
  build-and-smoke-test:
    name: Build + Smoke Test endpoints
    runs-on: ubuntu-latest

    steps:
    # ── 1. CHECKOUT ──────────────────────────────────────────────────────
    - name: Checkout código
      uses: actions/checkout@v4

    # ── 2. BUILD DA IMAGEM ───────────────────────────────────────────────
    - name: Build Docker image
      run: |
        docker build \
          -t ${{ env.IMAGE }}:${{ github.sha }} \
          -t ${{ env.IMAGE }}:latest \
          ./route_service_UC7

    # ── 3. ARRANCAR O CONTENTOR ──────────────────────────────────────────
    - name: Arrancar contentor
      run: |
        docker run -d \
          --name ${{ env.IMAGE }} \
          -p ${{ env.PORT }}:${{ env.PORT }} \
          -e API_TOKEN="" \
          -e PREDICTION_SERVICE_URL="http://localhost:8002" \
          -e OTEL_EXPORTER_OTLP_ENDPOINT="http://localhost:4318/v1/traces" \
          ${{ env.IMAGE }}:${{ github.sha }}

    - name: Ver containers
      if: always()
      run: docker ps -a

    - name: Logs do container
      if: always()
      run: docker logs ${{ env.IMAGE }} || true

    # ── 4. AGUARDAR O SERVIÇO ESTAR PRONTO ──────────────────────────────
    - name: Aguardar serviço iniciar
      run: |
        for i in $(seq 1 30); do
          if curl -sf http://localhost:${{ env.PORT }}/health > /dev/null; then
            echo "Serviço disponível após ${i}s"
            exit 0
          fi
          sleep 1
        done

        echo "Timeout: serviço não respondeu"
        docker ps -a
        docker logs ${{ env.IMAGE }} || true
        exit 1

    # ── 5. SMOKE TESTS ───────────────────────────────────────────────────
    - name: GET /health
      run: |
        BODY=$(curl -sf http://localhost:${{ env.PORT }}/health)
        echo "$BODY" | python3 -c "import sys, json; d=json.load(sys.stdin); assert d['status']=='ok'"

    - name: GET /ready
      run: |
        BODY=$(curl -sf http://localhost:${{ env.PORT }}/ready)
        echo "$BODY" | python3 -c "import sys, json; d=json.load(sys.stdin); assert d['status']=='ok'"

    - name: GET /metrics
      run: |
        curl -sf http://localhost:${{ env.PORT }}/metrics | grep "requests_total"
        curl -sf http://localhost:${{ env.PORT }}/metrics | grep "request_latency_seconds"

    # ── 6. DEPENDÊNCIAS ───────────────────────────────────────────────────
    - name: Instalar dependências para smoke tests
      run: |
        pip install fastapi httpx pytest prometheus-client --quiet

    # ── 7. TESTE /route/analyze (MOCK CORRETO) ───────────────────────────
    - name: POST /route/analyze — caso normal → 200
      run: |
        python3 - <<'EOF'
        import sys
        from unittest.mock import patch

        sys.path.insert(0, "route_service_UC7")
        from main import app
        from fastapi.testclient import TestClient

        class FakeResponse:
            def raise_for_status(self):
                pass
            def json(self):
                return {
                    "accident_probability": 0.35,
                    "predicted_severity": 2,
                    "nearby_accidents_count": 3
                }
        class FakeClient:
            async def post(self, *args, **kwargs):
                return FakeResponse()

        class FakeAsyncClient:
            async def __aenter__(self):
                return FakeClient()
            async def __aexit__(self, exc_type, exc, tb):
                pass

        with patch("httpx.AsyncClient", return_value=FakeAsyncClient()):
            client = TestClient(app)
            r = client.post("/route/analyze", json={
                "origin_lat": 34.05,
                "origin_lon": -118.24,
                "destination_lat": 34.10,
                "destination_lon": -118.20,
                "timestamp": "2022-01-15T08:00:00"
            })
            assert r.status_code == 200, r.text
            data = r.json()
            assert "risk_score" in data
            assert "risk_level" in data
            assert "recommended_route" in data
            assert "total_waypoints_analyzed" in data
        EOF

    # ── 8. TEST 422 ───────────────────────────────────────────────────────
    - name: POST /route/analyze — campos em falta → 422
      run: |
        python3 - <<'EOF'
        from main import app
        from fastapi.testclient import TestClient

        r = TestClient(app).post("/route/analyze", json={"origin_lat": 34.05})
        assert r.status_code == 422
        EOF

    # ── 9. CLEANUP ────────────────────────────────────────────────────────
    - name: Parar e remover contentor
      if: always()
      run: |
        docker stop ${{ env.IMAGE }} || true
        docker rm ${{ env.IMAGE }} || true
