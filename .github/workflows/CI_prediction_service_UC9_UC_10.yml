# =============================================================================
# CI - prediction-service-uc9-uc10
# =============================================================================

name: CI - prediction-service-uc9-uc10

on:
  push:
    branches: [ main ]
    paths:
      - 'prediction_service_UC9_UC10/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'prediction_service_UC9_UC10/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # ← CORRETO: dentro do job
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Lint with flake8
        run: |
          pip install flake8 --quiet
          flake8 prediction_service_UC9_UC10/ \
            --max-line-length=120 \
            --exclude=__pycache__ \
            --count --statistics
      
      - name: Run unit tests
        run: |
          pip install fastapi httpx pytest pytest-asyncio \
            google-cloud-bigquery google-auth \
            prometheus-client --quiet
          
          pytest prediction_service_UC9_UC10/tests/ -v --tb=short