name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Lint with flake8
        run: |
          pip install flake8 --quiet
          flake8 data_service_UC8_UC11/ --count --statistics
      
      - name: Test with pytest
        run: |
          pip install pytest fastapi httpx --quiet
          pytest data_service_UC8_UC11/tests/ -v