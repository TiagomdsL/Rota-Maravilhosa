name: CD — data-service-uc4

on:
  push:
    branches:
      - main
    paths:
      - "data_service_UC4/**"

env:
  IMAGE: data-service-uc4
  PORT: 8001

jobs:
  build-and-smoke-test:
    name: Build + Smoke Test endpoints
    runs-on: ubuntu-latest

    steps:
      # ── 1. CHECKOUT ──────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. BUILD DA IMAGEM ───────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            ./data_service_UC4

      # ── 3. ARRANCAR O CONTENTOR ──────────────────────────────────────────
      - name: Arrancar contentor
        run: |
          docker run -d \
            --name ${{ env.IMAGE }} \
            -p ${{ env.PORT }}:${{ env.PORT }} \
            -e API_TOKEN="" \
            -e OTEL_EXPORTER_OTLP_ENDPOINT="http://localhost:4318/v1/traces" \
            ${{ env.IMAGE }}:${{ github.sha }}

      # ── 4. AGUARDAR O SERVIÇO ESTAR PRONTO ──────────────────────────────
      - name: Aguardar serviço iniciar
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:${{ env.PORT }}/health > /dev/null; then
              echo "Serviço disponível após ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Timeout: serviço não respondeu"
          docker logs ${{ env.IMAGE }}
          exit 1

      # ── 5. SMOKE TESTS — ENDPOINTS SEM BQ ───────────────────────────────

      - name: "GET /health → 200 + {status: ok}"
        run: |
          BODY=$(curl -sf http://localhost:${{ env.PORT }}/health)
          echo "Response: $BODY"
          echo "$BODY" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') == 'ok', f'Esperado ok, obtido: {d}'
          print('OK')
          "

      - name: "GET /ready → 200 + {status: ok}"
        run: |
          BODY=$(curl -sf http://localhost:${{ env.PORT }}/ready)
          echo "Response: $BODY"
          echo "$BODY" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') == 'ok', f'Esperado ok, obtido: {d}'
          print('OK')
          "

      - name: "GET /metrics → 200 + text/plain + counters presentes"
        run: |
          RESPONSE=$(curl -sf -D - http://localhost:${{ env.PORT }}/metrics)
          echo "$RESPONSE" | grep -i "text/plain" || \
            { echo "FALHOU: content-type errado"; exit 1; }
          echo "$RESPONSE" | grep "requests_total" || \
            { echo "FALHOU: metric requests_total ausente"; exit 1; }
          echo "$RESPONSE" | grep "request_latency_seconds" || \
            { echo "FALHOU: metric request_latency_seconds ausente"; exit 1; }
          echo "OK"

      # ── 6. SMOKE TESTS — ENDPOINTS COM BQ (mock via patch) ───────────────

      - name: Instalar dependências para smoke tests BQ
        run: |
          pip install fastapi httpx pytest \
            google-cloud-bigquery google-auth \
            prometheus-client \
            opentelemetry-api opentelemetry-sdk \
            opentelemetry-exporter-otlp-proto-http \
            opentelemetry-instrumentation-fastapi \
            opentelemetry-instrumentation-httpx \
            --quiet

      - name: "POST /features — caso normal → 200 + campos correctos"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import patch, MagicMock

          tracing = MagicMock()
          tracing.setup_tracing = MagicMock()
          tracing.get_current_span = MagicMock(return_value=MagicMock())
          sys.modules["tracing"] = tracing

          sys.path.insert(0, "data_service_UC4")
          from main import app
          from fastapi.testclient import TestClient

          # Row principal com agregados
          main_row = MagicMock()
          main_row.__getitem__ = lambda s, k: {
              "total_accidents": 42,
              "avg_severity": 2.3,
              "avg_visibility": 8.5,
              "avg_precipitation": 0.1,
          }[k]

          # Rows de weather distribution
          weather_row = MagicMock()
          weather_row.__getitem__ = lambda s, k: "Clear" if k == "Weather_Condition" else 30
          weather_row.__bool__ = lambda s: True

          mock_client = MagicMock()
          mock_client.query.return_value.result.side_effect = [
              [main_row],
              [weather_row],
          ]

          payload = {
              "latitude": 34.05,
              "longitude": -118.24,
              "timestamp": "2024-01-15T08:00:00"
          }

          with patch("main.get_client", return_value=mock_client):
              r = TestClient(app).post("/features", json=payload)
              assert r.status_code == 200, f"Status: {r.status_code} — {r.text}"
              data = r.json()
              assert "total_accidents" in data
              assert "avg_severity" in data
              assert "weather_distribution" in data
              assert isinstance(data["weather_distribution"], dict)
              print(f"OK — /features: {data['total_accidents']} accidents")
          EOF

      - name: "POST /features — timestamp inválido → 422"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import MagicMock

          tracing = MagicMock()
          tracing.setup_tracing = MagicMock()
          tracing.get_current_span = MagicMock(return_value=MagicMock())
          sys.modules["tracing"] = tracing

          sys.path.insert(0, "data_service_UC4")
          from main import app
          from fastapi.testclient import TestClient

          payload = {
              "latitude": 34.05,
              "longitude": -118.24,
              "timestamp": "not-a-date"
          }

          r = TestClient(app).post("/features", json=payload)
          assert r.status_code in (422, 500), f"Esperado 422 ou 500, obtido {r.status_code}"
          print(f"OK — timestamp inválido → {r.status_code}")
          EOF

      - name: "POST /features — body em falta → 422"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import MagicMock

          tracing = MagicMock()
          tracing.setup_tracing = MagicMock()
          tracing.get_current_span = MagicMock(return_value=MagicMock())
          sys.modules["tracing"] = tracing

          sys.path.insert(0, "data_service_UC4")
          from main import app
          from fastapi.testclient import TestClient

          r = TestClient(app).post("/features", json={})
          assert r.status_code == 422, f"Esperado 422, obtido {r.status_code}"
          print("OK — body vazio → 422")
          EOF

      - name: "POST /features — BQ falha → 500"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import patch, MagicMock

          tracing = MagicMock()
          tracing.setup_tracing = MagicMock()
          tracing.get_current_span = MagicMock(return_value=MagicMock())
          sys.modules["tracing"] = tracing

          sys.path.insert(0, "data_service_UC4")
          from main import app
          from fastapi.testclient import TestClient

          mock_client = MagicMock()
          mock_client.query.side_effect = Exception("BQ unavailable")

          payload = {
              "latitude": 34.05,
              "longitude": -118.24,
              "timestamp": "2024-01-15T08:00:00"
          }

          with patch("main.get_client", return_value=mock_client):
              r = TestClient(app, raise_server_exceptions=False).post("/features", json=payload)
              assert r.status_code == 500, f"Esperado 500, obtido {r.status_code}"
              print("OK — BQ falha → 500")
          EOF

      - name: "GET /accidents/bounding-box — caso normal → 200 + lista acidentes"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import patch, MagicMock

          tracing = MagicMock()
          tracing.setup_tracing = MagicMock()
          tracing.get_current_span = MagicMock(return_value=MagicMock())
          sys.modules["tracing"] = tracing

          sys.path.insert(0, "data_service_UC4")
          from main import app
          from fastapi.testclient import TestClient

          rows = [
              {"latitude": 34.05, "longitude": -118.24, "severity": 2},
              {"latitude": 34.06, "longitude": -118.25, "severity": 3},
          ]
          mock_client = MagicMock()
          mock_client.query.return_value.result.return_value = [
              type("Row", (), {"__iter__": lambda s: iter(r.items()), **r})()
              for r in rows
          ]

          with patch("main.get_client", return_value=mock_client):
              r = TestClient(app).get(
                  "/accidents/bounding-box?min_lat=34.0&max_lat=34.1&min_lon=-118.3&max_lon=-118.2"
              )
              assert r.status_code == 200, f"Status: {r.status_code} — {r.text}"
              data = r.json()
              assert "accidents" in data
              assert isinstance(data["accidents"], list)
              print(f"OK — bounding-box: {len(data['accidents'])} acidentes")
          EOF

      - name: "GET /accidents/bounding-box — parâmetros em falta → 422"
        run: |
          python3 - <<'EOF'
          import sys
          from unittest.mock import MagicMock

          tracing = MagicMock()
          tracing.setup_tracing = MagicMock()
          tracing.get_current_span = MagicMock(return_value=MagicMock())
          sys.modules["tracing"] = tracing

          sys.path.insert(0, "data_service_UC4")
          from main import app
          from fastapi.testclient import TestClient

          r = TestClient(app).get("/accidents/bounding-box")
          assert r.status_code == 422, f"Esperado 422, obtido {r.status_code}"
          print("OK — sem parâmetros → 422")
          EOF

      # ── 7. LOGS EM CASO DE FALHA ─────────────────────────────────────────
      - name: Logs do contentor (em caso de falha)
        if: failure()
        run: docker logs ${{ env.IMAGE }}

      # ── 8. CLEANUP ───────────────────────────────────────────────────────
      - name: Parar e remover contentor
        if: always()
        run: |
          docker stop ${{ env.IMAGE }} || true
          docker rm   ${{ env.IMAGE }} || true