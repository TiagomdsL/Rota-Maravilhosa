name: CI - Observabilidade

on:
  push:
    paths:
      - 'deployment/**'
  pull_request:
    paths:
      - 'deployment/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate Prometheus
        run: |
          grep -A9999 'prometheus.yml:' deployment/kubernetes/prometheus_configmap.yaml \
            | tail -n +2 \
            | sed 's/^    //' > /tmp/prometheus.yml
          docker run --rm --entrypoint /bin/promtool \
            -v /tmp:/mnt prom/prometheus:latest \
            check config /mnt/prometheus.yml
      
      - name: Validate Grafana dashboards (JSON)
        run: |
          find deployment/grafana -name "*.json" 2>/dev/null | while read f; do
            python3 -m json.tool "$f" > /dev/null && echo "✓ $f"
          done
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
      
      - name: Validate K8s manifests
        run: |
          for file in deployment/kubernetes/*.yaml deployment/deployments/*.yaml deployment/services/*.yaml; do
            [ -f "$file" ] && kubectl apply -f "$file" --dry-run=client --validate=false
          done