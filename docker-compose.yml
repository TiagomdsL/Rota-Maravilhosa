version: '3.8'

services:
  # API Gateway
  api-gateway:
    build: ./api_gateway
    ports:
      - "8000:8000"
    environment:
      - DATA_SERVICE_URL=http://data-service:8001
      - PREDICTION_SERVICE_URL=http://prediction-service:8002
      - ROUTE_SERVICE_URL=http://route-service:8003
      - DATA_SERVICE_URL_UC123=http://data-service-uc123:8004
      - DATA_SERVICE_UC8_UC11_URL=http://data-service-uc8-uc11:8007
      - PREDICTION_SERVICE_UC9_UC10_URL=http://prediction-service-uc9-uc10:8008
    depends_on:
      - data-service
      - prediction-service
      - route-service
      - data-service-uc123
      - data-service-uc8-uc11
      - prediction-service-uc9-uc10
    networks:
      - accident-network
    restart: unless-stopped

  # Data Service (original - port 8001)
  data-service:
    build: ./data_service
    ports:
      - "8001:8001"
    volumes:
      - ./dataset:/app/dataset
      - ./dataset_service:/app/dataset_service
    environment:
      - DATASET_PATH=/app/dataset/US_Accidents_March23.csv
    networks:
      - accident-network
    restart: unless-stopped

  # Data Service UC123 (port 8004)
  data-service-uc123:
    build: ./data_service_uc123
    ports:
      - "8004:8004"
    volumes:
      - ./dataset:/app/dataset
      - ./dataset_service:/app/dataset_service
    environment:
      - DATASET_PATH=/app/dataset/US_Accidents_March23.csv
    networks:
      - accident-network
    restart: unless-stopped

  # Data Service UC8/UC11 (port 8007)
  data-service-uc8-uc11:
    build: ./data_service_uc8_uc11
    ports:
      - "8007:8007"
    volumes:
      - ./dataset:/app/dataset
    environment:
      - DATASET_PATH=/app/dataset/US_Accidents_March23.csv
    networks:
      - accident-network
    restart: unless-stopped

  # Prediction Service (original - port 8002)
  prediction-service:
    build: ./prediction_service
    ports:
      - "8002:8002"
    volumes:
      - ./dataset:/app/dataset
      - ./dataset_service:/app/dataset_service
      - prediction-cache:/app/cache
    environment:
      - DATASET_PATH=/app/dataset/US_Accidents_March23.csv
      - DATA_SERVICE_URL=http://data-service:8001
    depends_on:
      - data-service
    networks:
      - accident-network
    restart: unless-stopped

  # Prediction Service UC9/UC10 (port 8008)
  prediction-service-uc9-uc10:
    build: ./prediction_service_uc9_uc10
    ports:
      - "8008:8008"
    volumes:
      - ./dataset:/app/dataset
      - prediction-cache-uc9:/app/cache
    environment:
      - DATASET_PATH=/app/dataset/US_Accidents_March23.csv
    networks:
      - accident-network
    restart: unless-stopped

  # Route Service (port 8003)
  route-service:
    build: ./route_service
    ports:
      - "8003:8003"
    environment:
      - PREDICTION_SERVICE_URL=http://prediction-service:8002
    depends_on:
      - prediction-service
    networks:
      - accident-network
    restart: unless-stopped

networks:
  accident-network:
    driver: bridge

volumes:
  prediction-cache:
  prediction-cache-uc9: