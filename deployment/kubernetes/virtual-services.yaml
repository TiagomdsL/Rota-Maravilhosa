# virtual-services.yaml
# Timeout e Retry para todos os serviços via Istio VirtualService.
# Complementa os DestinationRules (circuit-breakers/) já existentes.
# perTryTimeout × attempts < timeout do serviço upstream (api-gateway 60s)

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: vs-api-gateway
  namespace: rota-maravilhosa
spec:
  hosts:
    - api-gateway
  http:
    - timeout: 60s
      retries:
        attempts: 2
        perTryTimeout: 25s
        retryOn: gateway-error,connect-failure,reset,retriable-4xx
      route:
        - destination:
            host: api-gateway

