apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rota-maravilhosa-ingress
  namespace: rota-maravilhosa
  annotations:
      kubernetes.io/ingress.class: "gce"
      kubernetes.io/ingress.global-static-ip-name: "rota-maravilhosa-ip"
spec:
  ingressClassName: nginx-example
  rules:
  - http:
      paths:
      - path: /api/v1/*
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 8000
