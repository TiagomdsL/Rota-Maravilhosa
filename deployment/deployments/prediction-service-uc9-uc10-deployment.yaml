apiVersion: apps/v1
kind: Deployment
metadata:
  name: prediction-service-uc9-uc10
  namespace: rota-maravilhosa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prediction-service-uc9-uc10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: prediction-service-uc9-uc10
    spec:
      containers:
      - name: prediction-service-uc9-uc10
        image: us-west4-docker.pkg.dev/proj1cc-493515/rota-maravilhosa/prediction-service-uc9-uc10:latest
        ports:
        - containerPort: 8008
        resources:
          requests:
            cpu: "150m"
            memory: "1Gi"
          limits:
            cpu: "500m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8008
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 8008
          initialDelaySeconds: 10
          periodSeconds: 10
        env:
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: bq-secret
              key: API_TOKEN
        envFrom:
        - configMapRef:
            name: rota-maravilhosa-config
