apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service-uc123
  namespace: rota-maravilhosa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-service-uc123
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: data-service-uc123
    spec:
      containers:
      - name: data-service-uc123
        image: europe-west1-docker.pkg.dev/proj1CC/rota-maravilhosa/data-service-uc123:latest
        ports:
        - containerPort: 8004
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 10
        envFrom:
        - configMapRef:
            name: rota-maravilhosa-config