apiVersion: apps/v1
kind: Deployment
metadata:
  name: prediction-service-uc5-uc6
  namespace: rota-maravilhosa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prediction-service-uc5-uc6
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: prediction-service-uc5-uc6
    spec:
      containers:
      - name: prediction-service
        image: us-west4-docker.pkg.dev/proj1cc-493515/rota-maravilhosa/prediction-service-uc5-uc6:latest
        ports:
        - containerPort: 8002
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
        startupProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 0
          periodSeconds: 10
          failureThreshold: 36
        env:
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: bq-secret
              key: API_TOKEN
        envFrom:
        - configMapRef:
            name: rota-maravilhosa-config
