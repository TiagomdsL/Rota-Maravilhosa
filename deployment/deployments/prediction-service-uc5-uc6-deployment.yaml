apiVersion: apps/v1
kind: Deployment
metadata:
  name: prediction-service-uc5-uc6
  namespace: rota-maravilhosa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prediction-service-uc5-uc6
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: prediction-service-uc5-uc6
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        # Pod level security context
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: prediction-service
        image: us-west4-docker.pkg.dev/proj1cc-493515/rota-maravilhosa/prediction-service-uc5-uc6:latest
        ports:
        - containerPort: 8002
        securityContext:
          # Container level security context
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: "25m"
            memory: "250Mi"
          limits:
            cpu: "800m"
            memory: "8Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
        startupProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 0
          periodSeconds: 10
          failureThreshold: 36
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.observability:4318/v1/traces"
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: bq-secret
              key: API_TOKEN
        - name: DATA_SERVICE_URL
          value: "http://data-service-uc4:8001"
        envFrom:
        - configMapRef:
            name: rota-maravilhosa-config
