apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service-uc4
  namespace: rota-maravilhosa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-service-uc4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: data-service-uc4
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:  
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: data-service-uc4
        image: us-west4-docker.pkg.dev/proj1cc-493515/rota-maravilhosa/data-service-uc4:latest
        ports:
        - containerPort: 8001
        securityContext:  
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: "50m"
            memory: "512Mi"
          limits:
            cpu: "200m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.observability:4318/v1/traces"
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: bq-secret
              key: API_TOKEN
        envFrom:
        - configMapRef:
            name: rota-maravilhosa-config