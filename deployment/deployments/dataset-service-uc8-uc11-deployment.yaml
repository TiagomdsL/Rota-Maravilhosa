apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service-uc8-uc11
  namespace: rota-maravilhosa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-service-uc8-uc11
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: data-service-uc8-uc11
    spec:
      containers:
      - name: data-service-uc8-uc11
        image: us-west4-docker.pkg.dev/proj1cc-493515/rota-maravilhosa/data-service-uc8-uc11:latest
        ports:
        - containerPort: 8007
        resources:
          requests:
            cpu: "100m"
            memory: "2Gi"
          limits:
            cpu: "300m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8007
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 8007
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: bq-secret
              key: API_TOKEN
        envFrom:
        - configMapRef:
            name: rota-maravilhosa-config