apiVersion: apps/v1
kind: Deployment
metadata:
  name: route-service-uc7
  namespace: rota-maravilhosa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: route-service-uc7
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: route-service-uc7
    spec:
      containers:
      - name: route-service
        image: europe-west1-docker.pkg.dev/proj1CC/rota-maravilhosa/route-service-uc7:latest
        ports:
        - containerPort: 8003
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 10
        envFrom:
        - configMapRef:
            name: rota-maravilhosa-config