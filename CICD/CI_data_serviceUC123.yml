steps:

  # ── 1. LINT ─────────────────────────────
  - id: lint
    name: python:3.11-slim
    entrypoint: bash
    args:
      - -c
      - |
        pip install flake8 --quiet
        flake8 data_service_UC123/ --count --statistics

  # ── 2. TESTES ───────────────────────────
  - id: tests
    name: python:3.11-slim
    entrypoint: bash
    args:
      - -c
      - |
        pip install pytest fastapi httpx --quiet
        pytest data_service_UC123/tests/ -v

  # ── 3. BUILD (SÓ VALIDAR SE COMPILA) ────
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - data-service-test
      - ./data_service_UC123
    waitFor: [tests]

options:
  machineType: E2_HIGHCPU_8